services:
  # Knowledge graph store: FalkorDB (Redis-based graph DB) powering Graphiti.
  # Replaces the former Zep Cloud dependency so the stack is fully self-hosted.
  falkordb:
    image: falkordb/falkordb:latest
    container_name: mirofish-falkordb
    restart: unless-stopped
    # Persist graph data across restarts
    volumes:
      - ./mirofish-data/graph:/data
    # Optional: expose the FalkorDB Browser UI / port on the host for debugging.
    # The backend reaches it over the internal compose network, so publishing is not required.
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend: gunicorn WSGI service (exposed only on the internal network, not published directly)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        # CPU torch by default (lightweight). GPU users can set TORCH_VARIANT=cu124 etc. in .env and rebuild
        # e.g. TORCH_VARIANT=cu124 docker compose build backend
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}
    image: mirofish-backend:local
    container_name: mirofish-backend
    env_file:
      - .env
    environment:
      # Secure defaults for production: disable the debugger; provide SECRET_KEY in .env
      - FLASK_DEBUG=false
      # gunicorn tuning (adjust to the machine's core count)
      - GUNICORN_WORKERS=4
      - GUNICORN_THREADS=2
      - GUNICORN_TIMEOUT=600
      # Graph store connection (overrides .env so it always points at the compose service)
      - GRAPH_DB_HOST=falkordb
      - GRAPH_DB_PORT=6379
    depends_on:
      falkordb:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./mirofish-data/uploads:/app/backend/uploads
    expose:
      - "5001"
    # --- Optional: enable NVIDIA GPU acceleration ---
    # Prerequisites: 1) rebuild with TORCH_VARIANT=cuXXX  2) install nvidia-container-toolkit on the host
    # Uncomment the block below to expose the GPU to the container:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Frontend: nginx serves static assets and reverse-proxies /api to the backend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: mirofish-frontend:local
    container_name: mirofish-frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "3000:3000"

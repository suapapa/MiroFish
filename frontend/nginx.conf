# MiroFish Frontend - nginx 静态服务 + /api 反向代理

# Suppress access logs for high-frequency polling (e.g. graph task status every 2s)
map $request_uri $log_access {
    default 1;
    ~^/api/graph/task/ 0;
}

server {
    listen       3000;
    server_name  _;

    access_log  /var/log/nginx/access.log  combined  if=$log_access;

    # 上传文件上限需与后端 MAX_CONTENT_LENGTH(50MB) 保持一致
    client_max_body_size 50m;

    # 隐藏 nginx 版本号
    server_tokens off;

    root   /usr/share/nginx/html;
    index  index.html;

    # 静态资源缓存（带 hash 的构建产物）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 反向代理到后端（与前端同源，无需 CORS）
    location /api/ {
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 本体生成等长耗时请求（后端客户端超时 300s，留足余量）
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
        # SSE/流式响应禁用缓冲
        proxy_buffering off;
    }

    # 后端健康检查透传
    location = /health {
        proxy_pass http://backend:5001/health;
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
